name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]

jobs:
  analyze:
    if: github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - run: flutter pub get
      # Genera código de Drift (bases de datos) antes del análisis estático
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze

  test:
    if: github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - run: flutter pub get
      # Genera código de Drift (bases de datos) antes de ejecutar tests
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-apk:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - run: flutter pub get
      # Genera código de Drift (bases de datos) antes de compilar el APK
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
